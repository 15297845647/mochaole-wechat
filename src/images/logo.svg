<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000"/>
      <stop offset="100%" style="stop-color:#C41E3A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- 左侧人物 -->
  <g transform="translate(60, 180)">
    <!-- 身体 -->
    <circle cx="50" cy="30" r="30" fill="#FFE4C4"/>
    <rect x="20" y="55" width="60" height="70" rx="10" fill="#4169E1"/>
    <!-- 剑 -->
    <line x1="80" y1="60" x2="130" y2="30" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <polygon points="135,25 130,30 132,38" fill="#FFD700"/>
  </g>
  
  <!-- 右侧人物 -->
  <g transform="translate(280, 180)">
    <!-- 身体 -->
    <circle cx="50" cy="30" r="30" fill="#FFE4C4"/>
    <rect x="20" y="55" width="60" height="70" rx="10" fill="#FF6B6B"/>
    <!-- 剑 -->
    <line x1="20" y1="60" x2="-30" y2="30" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <polygon points="-35,25 -30,30 -32,38" fill="#FFD700"/>
  </g>
  
  <!-- 中间剑交叉 -->
  <g transform="translate(256, 200)">
    <line x1="-40" y1="-30" x2="40" y2="30" stroke="#FFD700" stroke-width="10" stroke-linecap="round"/>
    <line x1="40" y1="-30" x2="-40" y2="30" stroke="#FFD700" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="12" fill="#D4AF37"/>
  </g>
  
  <!-- 文字 -->
  <text x="256" y="430" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="52" font-weight="bold" fill="#fff" letter-spacing="4">莫吵了</text>
</svg>
